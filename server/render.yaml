services:
  - type: web
    name: cx-guardian-server
    env: node
    region: oregon
    plan: starter
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_AI_URL
        sync: false
      - key: CLIENT_URL
        sync: false
